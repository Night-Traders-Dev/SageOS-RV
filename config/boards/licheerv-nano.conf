## config/boards/licheerv-nano.conf
## LicheeRV Nano (Sophgo SG2002, C906 RISC-V core) configuration
##
## Reference: Sipeed LicheeRV Nano board
## SoC:       Sophgo SG2002
## CPU:       T-Head C906 (rv64imafdc) @ 1 GHz
## RAM:       256 MB DDR3
## Storage:   microSD card
##
## Peripheral base addresses from cvitek BSP reference.
## Verify against your specific board/firmware DTB.

BOARD_NAME="LicheeRV Nano (SG2002)"
BOARD_ARCH="rv64"
BOARD_CPU="rv64imac"

## Memory (SG2002 DRAM at 0x80000000, 256MB)
QEMU_MEM_BASE="0x80000000"
QEMU_MEM_SIZE="256M"
STACK_TOP="0x8FE00000"

## UART (16550A-compatible at SG2002 UART0)
UART_BASE="0x04140000"
UART_BAUD="115200"

## PLIC (Platform-Level Interrupt Controller)
PLIC_BASE="0x0C000000"

## Timer frequency (C906 ACLINT MTIMER)
TIMER_FREQ="25000000"

## --- Peripheral Base Addresses (SG2002) ---

## GPIO (DesignWare GPIO, 4 banks)
GPIO0_BASE="0x03020000"
GPIO1_BASE="0x03021000"
GPIO2_BASE="0x03022000"
GPIO3_BASE="0x03023000"

## I2C (DesignWare I2C, 4 controllers)
I2C0_BASE="0x04000000"
I2C1_BASE="0x04010000"
I2C2_BASE="0x04020000"
I2C3_BASE="0x04030000"

## SPI (DesignWare SPI, 2 controllers)
SPI0_BASE="0x04180000"
SPI1_BASE="0x04181000"
SPI2_BASE="0x04182000"
SPI3_BASE="0x04183000"

## System Controller
SYSCON_BASE="0x03001000"

## Watchdog Timer
WDT_BASE="0x03010000"

## UART ports
UART0_BASE="0x04140000"
UART1_BASE="0x04150000"
UART2_BASE="0x04160000"
UART3_BASE="0x04170000"

## Clock / PLL
CLKGEN_BASE="0x03002000"

## Reset Controller
RST_BASE="0x03000000"

## --- Compile-time defines passed to C/ASM ---
## These get passed as -D flags to GCC
BM_EXTRA_DEFS="-DCONFIG_BOARD_LICHERV_NANO -DGPIO0_BASE=${GPIO0_BASE} -DPLIC_BASE=${PLIC_BASE}"

## Physical deployment
SD_DEVICE="/dev/mmcblk0"
