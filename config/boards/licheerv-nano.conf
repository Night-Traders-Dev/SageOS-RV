## config/boards/licheerv-nano.conf
## LicheeRV Nano (Sophgo SG2002, C906 RISC-V core) configuration
##
## Reference: Sipeed LicheeRV Nano board
## SoC:       Sophgo SG2002
## CPU:       T-Head C906 (rv64imafdc) @ 1 GHz
## RAM:       256 MB DDR3
## Storage:   microSD card
##
## NOTE: Exact memory map depends on vendor DTB and bootloader.
## These values are based on the cvitek BSP reference.
## Verify against your specific board/firmware.

BOARD_NAME="LicheeRV Nano (SG2002)"
BOARD_ARCH="rv64"
BOARD_CPU="rv64imac"

## Memory (SG2002 DRAM at 0x80000000, 256MB)
QEMU_MEM_BASE="0x80000000"
QEMU_MEM_SIZE="256M"
STACK_TOP="0x8F000000"

## UART (16550A-compatible at SG2002 UART0)
## cvitek BSP places UART0 at 0x04140000
UART_BASE="0x04140000"
UART_BAUD="115200"

## PLIC / CLINT (SG2002 platform-level interrupt controller)
PLIC_BASE="0x0C000000"
CLINT_BASE="0x02000000"

## Timer (C906 timer frequency)
TIMER_FREQ="25000000"

## Physical deployment (not QEMU)
## Flash to SD card: dd if=images/sageos.bin of=/dev/sdX bs=1M
SD_DEVICE="/dev/mmcblk0"
