## config/boards/qemu-virt.conf
## QEMU RISC-V virt machine configuration

BOARD_NAME="QEMU RISC-V 64 virt"
BOARD_ARCH="rv64"
BOARD_CPU="rv64"

## Memory
QEMU_MEM_BASE="0x80200000"
QEMU_MEM_SIZE="128M"
STACK_TOP="0x87E00000"

## UART (16550A-compatible)
UART_BASE="0x10000000"
UART_BAUD="115200"

## PLIC / CLINT
PLIC_BASE="0x0C000000"
CLINT_BASE="0x02000000"

## Timer
TIMER_FREQ="10000000"

## QEMU flags
QEMU_MACHINE="virt"
QEMU_CPU="rv64"
QEMU_SMP="1"
QEMU_RAM="128M"
QEMU_EXTRA="-nographic"
