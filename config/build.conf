## build.conf — SageOS-RV build configuration

## Target board: qemu-virt | licheerv-nano
BOARD="${BOARD:-qemu-virt}"

## RISC-V cross-compiler
RISCV_CC="${RISCV_CC:-riscv64-linux-gnu-gcc}"
RISCV_LD="${RISCV_LD:-riscv64-linux-gnu-ld}"
RISCV_OBJCOPY="${RISCV_OBJCOPY:-riscv64-linux-gnu-objcopy}"

## QEMU
QEMU_BIN="${QEMU_BIN:-qemu-system-riscv64}"

## OpenSBI firmware path
OPENSBI_FW="${OPENSBI_FW:-/usr/lib/riscv64-linux-gnu/opensbi/generic/fw_dynamic.bin}"

## Load board-specific configuration
BOARD_CONF="${SCRIPT_DIR}/config/boards/${BOARD}.conf"
if [ -f "${BOARD_CONF}" ]; then
    source "${BOARD_CONF}"
else
    echo "Warning: Board config not found: ${BOARD_CONF}" >&2
    echo "  Falling back to qemu-virt defaults" >&2
    BOARD_NAME="Unknown (${BOARD})"
    QEMU_MEM_BASE="0x80200000"
    QEMU_MEM_SIZE="128M"
    STACK_TOP="0x81000000"
    UART_BASE="0x10000000"
    UART_BAUD="115200"
    PLIC_BASE="0x0C000000"
    TIMER_FREQ="10000000"
    QEMU_MACHINE="virt"
    QEMU_CPU="rv64"
    QEMU_SMP="1"
    QEMU_RAM="128M"
    QEMU_EXTRA="-nographic"
fi

## Compose arch-specific flags based on board CPU
case "${BOARD_CPU:-rv64}" in
    rv64*) BM_ARCH="-march=rv64imac_zicsr_zifencei -mabi=lp64" ;;
    *)     BM_ARCH="-march=rv64imac_zicsr_zifencei -mabi=lp64" ;;
esac
